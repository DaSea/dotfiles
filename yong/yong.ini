#!/usr/bin/yong-config
#Yong输入法配置文件

[DESC]
#配置文件版本
version=2

[IM]
default=0
0=HeCloud
1=sogou

#候选字个数
cand=5
#自造词来源是鼠标选择(PRIMARY)，还是剪贴版(CLIPBOARD)
select=CLIPBOARD
#简繁转换
#简繁一对多转换
s2t_m=0
#汉字过滤 0:不过滤 1：常用汉字
filter=0
#默认启动
enable=1
#皮肤
skin=skin/嫩芽儿-低 0
#回车键行为 clear:清编码 commit:上屏首选
enter=default
#数字键行为
#num=push
#半角出全角空格
#space=full
#预编辑模式 0:禁用 1:启用
#预编辑类型 0:候选 1:编码
preedit=0
#自动调频
auto_move=1
#历史记录
#history=history.txt
#小键盘 0:默认 1:不作为编码键 2:出数字
keypad=0
space=default
#enter=default
onspot=1

# 汉字解释
dict_cn=https://hanyu.baidu.com/s?wd=%s

[main]
#用户的配置文件编辑器
edit=
#显示托盘图标
tray=1
#不显示主窗口
#状态栏半透明
#主窗口位置 0:右下 1:顶部居中 2:左下
pos=0
# 帮助文件
help=yong.chm
tran=1

[input]
#编码提示
hint=1
#不使用光标跟随
#新光标跟随方式，设成0则用原来的方式，1用新方式
a_caret=1
#不显示输入窗口
noshow=0
#候选显示长度
strip=9
font=Microsoft YaHei Bold 16

[key]
# 造词
add=CTRL_=
#打开输入法
trigger=CTRL_SPACE
#二三重码选择
select=LSHIFT RSHIFT
#中英文切换
CNen=LSHIFT
#临时英语模式
tEN=LCTRL
#切换输入法
switch=CTRL_LSHIFT
#翻页
page=, .
#page=, .
#以词定字
w2c=[ ]
#汉字过滤
filter=\\
#调词频
move=CTRL_UP CTRL_DOWN
#显示输入条
ishow=none
#一键切换到输入法
switch_default=CTRL_`

# [pinyin]
# name=拼音
# engine=libmb.so
# arg=mb/pinyin.txt
# overlay=mb/pinyin.ini

[sogou]
name=[搜狗]
engine=libcloud.so
arg=baidu
overlay=mb/pinyin.ini
pinyin=mb/pinyin.txt
# assist=mb/wbx.txt

[HeCloud]
# 参考：http://yong.dgod.net/read.php?tid=2342&fid=4
# http://yong.dgod.net/read.php?tid=1631&fid=2
name=鹤云
# 云功能
engine=libcloud.so
# 使用sogou云，如果想用qq，那么你设置上qq，可选 sogou,qq,baidu
arg=baidu
# 设置小鹤双拼，如果是其他方案，那么请自定义双拼，双拼 方案 放在.yong或者根目录
sp=hepy
# 自定义短语，文件名自定义
user=mb/HeCloud.txt
bihua=alpdv
beep=none

[sync]
